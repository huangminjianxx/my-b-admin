name: Deploy Vite Project (Robust Offline Mode)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v3

      - name: 2. 设置 Node.js 环境
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: 3. 构建 Docker 镜像并打包
        run: |
          docker build -t vite-app:latest .
          docker save vite-app:latest -o vite-app.tar

      - name: 4. 通过 SCP 将镜像发送到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "vite-app.tar"
          target: "~/" # 修改点：传输到当前用户的家目录，避免权限问题
          rm: false    # 修改点：严禁设置 rm: true，防止删除系统目录

      - name: 5. 远程执行部署脚本
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          script: |
            set -e
            docker load -i ~/vite-app.tar
            docker stop fullstack-container || true
            docker rm fullstack-container || true
            
            # 映射服务器的 8080 到 Express 的 3000
            docker run -d \
              --name fullstack-container \
              -p 8080:3000 \
              --restart always \
              vite-app:latest