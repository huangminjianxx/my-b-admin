name: Deploy Vite Project

# 触发条件：当代码推送到 main 分支时执行
on:
  push:
    branches:
      - main

jobs:
  # 任务一：构建镜像并推送到镜像仓库
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 设置 Docker Buildx (用于加速构建)
        uses: docker/setup-buildx-action@v2

      - name: 构建并推送镜像
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 镜像名称，建议使用你的用户名/项目名
          tags: ${{ secrets.DOCKER_USERNAME }}/vite-app:latest
          # 缓存设置，让下次构建更快
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 任务二：远程部署
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # 必须等任务一成功后才开始
    steps:
      - name: 通过 SSH 远程执行部署脚本
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. 登录 Docker (防止拉取私有镜像失败)
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # 2. 停止旧容器 (如果存在)
            docker stop vite-app-container || true
            
            # 3. 删除旧容器
            docker rm vite-app-container || true
            
            # 4. 拉取刚才推送到仓库的最新的镜像
            docker pull ${{ secrets.DOCKER_USERNAME }}/vite-app:latest
            
            # 5. 启动新容器
            # -p 8080:80 表示将服务器的 8080 端口映射到容器内的 80 端口
            docker run -d \
              --name vite-app-container \
              -p 8080:80 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/vite-app:latest
            
            # 6. 清理服务器上残留的虚悬镜像（释放磁盘空间）
            docker image prune -f