name: Deploy Vite Project (Robust Offline Mode)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v3

      - name: 2. 设置 Node.js 环境
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: 3. 构建 Docker 镜像并打包
        run: |
          docker build -t vite-app:latest .
          docker save vite-app:latest -o vite-app.tar

      - name: 4. 通过 SCP 将镜像发送到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "vite-app.tar"
          target: "~/" # 修改点：传输到当前用户的家目录，避免权限问题
          rm: false    # 修改点：严禁设置 rm: true，防止删除系统目录

      - name: 5. 远程执行部署脚本 (离线模式)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "--- 正在从家目录加载镜像 ---"
            # 修改点：对应家目录路径 ~/vite-app.tar
            docker load -i ~/vite-app.tar

            echo "--- 正在重启容器 ---"
            docker stop vite-app-container || true
            docker rm vite-app-container || true

            docker run -d \
              --name vite-app-container \
              -p 8080:80 \
              --restart always \
              vite-app:latest

            echo "--- 清理传输文件 ---"
            rm ~/vite-app.tar

            echo "--- 部署完成！ ---"
            docker ps -f name=vite-app-container